<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Password Brute Force Speed Demo</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: #0f0;
      text-align: center;
      padding: 40px;
    }
    h1 { color: #0ff; }
    #output {
      font-size: 24px;
      margin: 20px 0;
    }
    #speed {
      font-size: 20px;
      color: #ff0;
    }
    button {
      padding: 10px 20px;
      font-size: 16px;
      background: #0f0;
      border: none;
      cursor: pointer;
    }
  </style>
</head>
<body>

<h1>Brute Force Password Speed Demo</h1>

<button onclick="start()">Start Test</button>

<div id="output">Current Guess: ----</div>
<div id="speed">Speed: 0 guesses/sec</div>

<script>
const chars = "abcdefghijklmnopqrstuvwxyz";
let running = false;

function start() {
  if (running) return;
  running = true;

  let count = 0;
  let startTime = performance.now();

  function bruteForce() {
    for (let i = 0; i < 5000; i++) { // batch size (adjust for speed)
      let guess =
        chars[Math.floor(count / (26*26*26)) % 26] +
        chars[Math.floor(count / (26*26)) % 26] +
        chars[Math.floor(count / 26) % 26] +
        chars[count % 26];

      document.getElementById("output").textContent = "Current Guess: " + guess;

      count++;

      if (count >= Math.pow(26, 4)) {
        running = false;
        return;
      }
    }

    let elapsed = (performance.now() - startTime) / 1000;
    let speed = Math.floor(count / elapsed);

    document.getElementById("speed").textContent =
      "Speed: " + speed + " guesses/sec";

    requestAnimationFrame(bruteForce);
  }

  bruteForce();
}
</script>

</body>
</html>
