<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Username Checker</title>
<style>
    body {
        font-family: Arial;
        background: #0f172a;
        color: white;
        padding: 20px;
    }
    textarea, input {
        width: 100%;
        margin: 10px 0;
        padding: 10px;
        border-radius: 8px;
        border: none;
    }
    button {
        padding: 10px 20px;
        background: #22c55e;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-weight: bold;
    }
    #results {
        margin-top: 20px;
        white-space: pre-wrap;
        background: #1e293b;
        padding: 10px;
        border-radius: 8px;
        max-height: 300px;
        overflow-y: auto;
    }
</style>
</head>
<body>

<h2>Discord Username Checker</h2>

<label>Proxies (one per line)</label>
<textarea id="proxies" placeholder="ip:port or user:pass@ip:port"></textarea>

<label>Usernames (one per line)</label>
<textarea id="usernames" placeholder="abc\nxyz\ncool_name"></textarea>

<button onclick="startCheck()">Start Checking</button>

<div id="results"></div>

<script>
let proxies = [];
let proxyIndex = 0;

function getNextProxy() {
    if (proxies.length === 0) return null;
    const proxy = proxies[proxyIndex];
    proxyIndex = (proxyIndex + 1) % proxies.length;
    return proxy;
}

// MOCK checker (replace with real API/backend)
async function checkUsername(username, proxy) {
    // simulate delay
    await new Promise(r => setTimeout(r, 200));

    // fake random result
    const available = Math.random() > 0.7;

    return {
        username,
        available
    };
}

async function startCheck() {
    const usernamesInput = document.getElementById("usernames").value;
    const proxiesInput = document.getElementById("proxies").value;
    const resultsDiv = document.getElementById("results");

    resultsDiv.innerHTML = "Checking...\n";

    const usernames = usernamesInput.split("\n").map(u => u.trim()).filter(Boolean);
    proxies = proxiesInput.split("\n").map(p => p.trim()).filter(Boolean);

    let concurrency = 10; // increase for speed
    let index = 0;

    async function worker() {
        while (index < usernames.length) {
            let i = index++;
            let username = usernames[i];
            let proxy = getNextProxy();

            try {
                let result = await checkUsername(username, proxy);

                resultsDiv.innerHTML += 
                    `${result.available ? "✅" : "❌"} ${username}\n`;
            } catch (e) {
                resultsDiv.innerHTML += `⚠️ Error: ${username}\n`;
            }
        }
    }

    let workers = [];
    for (let i = 0; i < concurrency; i++) {
        workers.push(worker());
    }

    await Promise.all(workers);

    resultsDiv.innerHTML += "\nDone.";
}
</script>

</body>
</html>
