<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Games</title>
<style>
body {
  margin: 0;
  overflow: hidden;
  background: black;
  color: white;
  font-family: Arial, sans-serif;
}
canvas {
  display: block;
}
</style>
</head>
<body>

<canvas id="c"></canvas>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// GAME STATE
let state = "menu";
let score = 0;
let combo = 0;
let multiplier = 1;
let shake = 0;

// PLAYER
let player = {
  x: canvas.width / 2,
  y: canvas.height - 80,
  w: 60,
  h: 15,
  vx: 0,
  dash: 0,
  shield: 0
};

// INPUT
let keys = {};
addEventListener("keydown", e => {
  keys[e.key] = true;
  if (state !== "playing") start();
});
addEventListener("keyup", e => keys[e.key] = false);

// OBJECTS
let enemies = [];
let particles = [];
let powerups = [];

// START GAME
function start() {
  state = "playing";
  score = 0;
  combo = 0;
  multiplier = 1;
  enemies = [];
  particles = [];
  powerups = [];
}

// SPAWN ENEMIES
function spawnEnemy() {
  if (state !== "playing") return;

  let type = Math.random();
  let speed = 2 + Math.random() * 2;

  if (type < 0.7) {
    enemies.push({x: Math.random()*canvas.width, y:-20, s:20, v:speed, hp:1});
  } else if (type < 0.9) {
    enemies.push({x: Math.random()*canvas.width, y:-20, s:15, v:speed*2, hp:1});
  } else {
    enemies.push({x: Math.random()*canvas.width, y:-20, s:30, v:speed*0.7, hp:3});
  }

  // random powerup
  if (Math.random() < 0.1) {
    powerups.push({x: Math.random()*canvas.width, y:-20, t: Math.random()<0.5?"slow":"shield"});
  }
}

// UPDATE
function update() {
  if (state !== "playing") return;

  // movement
  if (keys["ArrowLeft"]) player.vx -= 0.6;
  if (keys["ArrowRight"]) player.vx += 0.6;

  player.vx *= 0.9;
  player.x += player.vx;

  player.x = Math.max(0, Math.min(canvas.width-player.w, player.x));

  // dash
  if (keys[" "] && player.dash <= 0) {
    player.vx *= 5;
    player.dash = 60;
  }
  player.dash--;

  // enemies
  enemies.forEach((e,i)=>{
    e.y += e.v;

    if (
      e.y + e.s > player.y &&
      e.x < player.x + player.w &&
      e.x + e.s > player.x
    ) {
      if (player.shield > 0) {
        player.shield = 0;
      } else {
        shake = 20;
        state = "gameover";
      }
    }

    if (e.y > canvas.height) {
      enemies.splice(i,1);
      combo = 0;
      multiplier = 1;
    }
  });

  // powerups
  powerups.forEach((p,i)=>{
    p.y += 2;

    if (
      p.y > player.y &&
      p.x < player.x + player.w &&
      p.x > player.x
    ) {
      if (p.t === "slow") {
        enemies.forEach(e=>e.v *= 0.5);
      } else {
        player.shield = 300;
      }
      powerups.splice(i,1);
    }
  });

  player.shield--;

  // particles
  particles.forEach((p,i)=>{
    p.x+=p.vx; p.y+=p.vy; p.life--;
    if (p.life<=0) particles.splice(i,1);
  });

  score += 0.1 * multiplier;
}

// DRAW BACKGROUND GRID
function drawGrid() {
  ctx.strokeStyle = "#0ff";
  ctx.globalAlpha = 0.2;

  for (let i=0;i<canvas.height;i+=40){
    ctx.beginPath();
    ctx.moveTo(0,i + (Date.now()*0.05)%40);
    ctx.lineTo(canvas.width,i + (Date.now()*0.05)%40);
    ctx.stroke();
  }

  ctx.globalAlpha = 1;
}

// DRAW
function draw() {
  ctx.fillStyle = "black";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  drawGrid();

  if (shake > 0) {
    ctx.translate(Math.random()*shake-shake/2, Math.random()*shake-shake/2);
    shake--;
  }

  if (state === "menu") {
    ctx.font = "40px Arial";
    ctx.fillText("NEON SURVIVAL", canvas.width/2-180, canvas.height/2);
    ctx.font = "20px Arial";
    ctx.fillText("Press Any Key", canvas.width/2-80, canvas.height/2+40);
    return;
  }

  if (state === "gameover") {
    ctx.font = "40px Arial";
    ctx.fillText("GAME OVER", canvas.width/2-140, canvas.height/2);
    ctx.fillText("Score: "+Math.floor(score), canvas.width/2-120, canvas.height/2+50);
    return;
  }

  // player
  ctx.fillStyle = player.shield>0 ? "lime":"cyan";
  ctx.shadowColor = ctx.fillStyle;
  ctx.shadowBlur = 20;
  ctx.fillRect(player.x,player.y,player.w,player.h);

  // enemies
  enemies.forEach(e=>{
    ctx.fillStyle = e.hp>1 ? "orange":"red";
    ctx.shadowColor = ctx.fillStyle;
    ctx.fillRect(e.x,e.y,e.s,e.s);
  });

  // powerups
  powerups.forEach(p=>{
    ctx.fillStyle = p.t==="slow"?"blue":"green";
    ctx.fillRect(p.x,p.y,15,15);
  });

  ctx.shadowBlur = 0;

  // UI
  ctx.fillStyle="white";
  ctx.fillText("Score: "+Math.floor(score),20,30);
  ctx.fillText("Combo: "+combo,20,50);
}

// LOOP
function loop(){
  ctx.setTransform(1,0,0,1,0,0);
  update();
  draw();
  requestAnimationFrame(loop);
}

setInterval(spawnEnemy, 700);
loop();
</script>

</body>
</html>
