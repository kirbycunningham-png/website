<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login + Brute Force Demo</title>
<style>
  body {
    font-family: Arial;
    background: #111;
    color: #0f0;
    text-align: center;
    padding: 40px;
  }
  input, button {
    padding: 10px;
    margin: 10px;
    font-size: 16px;
  }
  #status {
    margin-top: 20px;
    font-size: 20px;
  }
</style>
</head>
<body>

<h1>Login Simulation</h1>

<p>Set a 4-letter password:</p>
<input id="passwordInput" maxlength="4" placeholder="e.g. abcd">
<br>
<button onclick="startAttack()">Login</button>

<div id="status"></div>

<script>
const chars = "abcdefghijklmnopqrstuvwxyz";

function startAttack() {
  let target = document.getElementById("passwordInput").value;

  if (target.length !== 4) {
    alert("Password must be exactly 4 lowercase letters.");
    return;
  }

  let count = 0;
  let startTime = performance.now();

  function bruteForce() {
    for (let i = 0; i < 5000; i++) {

      let guess =
        chars[Math.floor(count / (26*26*26)) % 26] +
        chars[Math.floor(count / (26*26)) % 26] +
        chars[Math.floor(count / 26) % 26] +
        chars[count % 26];

      document.getElementById("status").textContent =
        "Trying: " + guess;

      if (guess === target) {
        let time = ((performance.now() - startTime) / 1000).toFixed(2);

        document.getElementById("status").innerHTML =
          "✅ Password found: <b>" + guess + "</b><br>" +
          "Guesses: " + count + "<br>" +
          "Time: " + time + " seconds";

        return;
      }

      count++;
    }

    requestAnimationFrame(bruteForce);
  }

  bruteForce();
}
</script>

</body>
</html>
